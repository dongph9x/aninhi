services:
  aninhi-bot:
    build: .
    container_name: aninhi-discord-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:../data/database.db
    volumes:
      # Database SQLite - quyền sẽ được docker-entrypoint.sh tự chỉnh khi container start
      - ./data:/app/data
      # Log output
      - ./logs:/app/logs
      # Biến môi trường (BOT_TOKEN, ...) - đọc theo env/.env, env/.env.production...
      - ./env:/app/env:ro
    ports:
      # Expose port nếu bot có web interface
      - "3000:3000"
    networks:
      - aninhi-network
    healthcheck:
      test: ["CMD", "su-exec", "node", "sh", "-c", "test -w /app/data && test -w /app/logs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Service để chạy migration thủ công (bot tự chạy "prisma migrate deploy" lúc
  # start rồi, service này chỉ cần khi muốn tách bước migrate riêng, ví dụ CI/CD)
  database-init:
    build: .
    container_name: aninhi-db-init
    environment:
      - DATABASE_URL=file:../data/database.db
    volumes:
      - ./data:/app/data
    entrypoint: ["docker-entrypoint.sh"]
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma migrate deploy &&
        echo 'Database initialized successfully'
      "
    profiles:
      - init

  # Prisma Studio - Web interface để xem database
  prisma-studio:
    build: .
    container_name: aninhi-prisma-studio
    environment:
      - DATABASE_URL=file:../data/database.db
    volumes:
      - ./data:/app/data
      - ./prisma:/app/prisma
    ports:
      - "5555:5555"
    entrypoint: ["docker-entrypoint.sh"]
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma studio --hostname 0.0.0.0 --port 5555
      "
    profiles:
      - studio

networks:
  aninhi-network:
    driver: bridge 